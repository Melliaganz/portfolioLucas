name: CI Portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        # Linker node-modules en CI : le loader ESM de PnP échoue à résoudre
        # certaines dépendances transitives (ex. @exodus/bytes) au lancement
        # des workers Vitest. node-modules extrait tout, c'est robuste ici.
        run: |
          yarn config set nodeLinker node-modules
          yarn install

      - name: Lint
        run: yarn lint

      - name: Run Tests
        run: yarn test:run

      - name: Build
        run: yarn build
